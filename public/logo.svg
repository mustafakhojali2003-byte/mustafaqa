<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C8960C"/>
    </linearGradient>
  </defs>

  <!-- Hexagon -->
  <polygon points="80,12 118,33 118,76 80,97 42,76 42,33" fill="none" stroke="url(#g1)" stroke-width="2.2"/>
  <polygon points="80,22 110,39 110,70 80,87 50,70 50,39" fill="none" stroke="#FFD700" stroke-width="0.7" opacity="0.3"/>

  <!-- Eye/target inside hex -->
  <circle cx="80" cy="55" r="22" fill="none" stroke="url(#g1)" stroke-width="1.8"/>
  <circle cx="80" cy="55" r="13" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <circle cx="80" cy="55" r="5.5" fill="url(#g1)"/>
  <circle cx="80" cy="55" r="2" fill="#0d0d0d"/>
  <line x1="42" y1="55" x2="57" y2="55" stroke="#FFD700" stroke-width="1.4" opacity="0.7"/>
  <line x1="103" y1="55" x2="118" y2="55" stroke="#FFD700" stroke-width="1.4" opacity="0.7"/>
  <line x1="80" y1="12" x2="80" y2="32" stroke="#FFD700" stroke-width="0.9" opacity="0.4"/>
  <line x1="80" y1="78" x2="80" y2="97" stroke="#FFD700" stroke-width="0.9" opacity="0.4"/>

  <!-- Vertical gold bar divider -->
  <rect x="138" y="18" width="4" height="110" rx="2" fill="url(#g2)"/>

  <!-- Big Q letter -->
  <text x="152" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="105" font-weight="700" fill="url(#g1)">Q</text>

  <!-- GUARD top -->
  <text x="228" y="48" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#888888" letter-spacing="7">GUARD</text>
  <line x1="228" y1="54" x2="478" y2="54" stroke="#FFD700" stroke-width="0.7" opacity="0.35"/>

  <!-- Security -->
  <text x="228" y="92" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#FFD700" letter-spacing="1">Security</text>

  <!-- Platform -->
  <text x="230" y="118" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666" letter-spacing="3">Platform</text>

  <!-- Bottom line -->
  <line x1="138" y1="136" x2="478" y2="136" stroke="#FFD700" stroke-width="0.5" opacity="0.2"/>
</svg>

<!-- QGuard brand -->
