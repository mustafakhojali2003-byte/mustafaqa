name: Build QGuard APK (Signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/qguard-release.jks

      - name: Build Release APK (Signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/qguard-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      - name: Build Debug APK (Fallback)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "APK_PATH=android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "APK_PATH=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QGuard-APK
          path: ${{ steps.find_apk.outputs.APK_PATH }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "QGuard v${{ github.run_number }}"
          body: |
            ## QGuard APK - الإصدار ${{ github.run_number }}
            📥 حمّل ملف APK أدناه وثبّته على هاتف Android
          files: ${{ steps.find_apk.outputs.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
